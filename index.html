<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluador Estratégico: Copilot en Pymes</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM para la interactividad -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [answers, setAnswers] = useState([null, null, null, null]);
            const [trm, setTrm] = useState(4000);
            const [powerUsers, setPowerUsers] = useState(5);
            const [usdCost, setUsdCost] = useState(30);

            const [isGenerating, setIsGenerating] = useState(false);
            const [aiSummary, setAiSummary] = useState('');
            const [aiError, setAiError] = useState('');
            const [copied, setCopied] = useState(false);

            const questions = [
                {
                    id: 0,
                    text: "¿Su equipo utiliza Copilot para generar respuestas en tiempo real frente a clientes (ej. soporte, ventas)?",
                    detail: "La latencia del 'Acceso Estándar' podría afectar la experiencia del cliente."
                },
                {
                    id: 1,
                    text: "¿La productividad de su área depende de la generación masiva de contenido o análisis de datos complejos diario?",
                    detail: "El 'Acceso Prioritario' ofrece procesamiento acelerado para tareas pesadas."
                },
                {
                    id: 2,
                    text: "¿Los picos de trabajo de su empresa coinciden con las horas laborales de EE. UU.?",
                    detail: "Durante estas horas, los usuarios 'Estándar' pueden experimentar mayores tiempos de espera."
                },
                {
                    id: 3,
                    text: "¿El costo operativo de tener a un empleado esperando 30-60 segundos por consulta supera el costo de una licencia?",
                    detail: "Evalúe el costo por hora de sus empleados frente al costo mensual de la licencia."
                }
            ];

            const handleAnswer = (index, value) => {
                const newAnswers = [...answers];
                newAnswers[index] = value;
                setAnswers(newAnswers);
            };

            const calculateScore = () => {
                return answers.filter(a => a === true).length;
            };

            const isComplete = answers.every(a => a !== null);
            const score = calculateScore();

            const monthlyCostUSD = powerUsers * usdCost;
            const monthlyCostCOP = monthlyCostUSD * trm;
            const annualCostCOP = monthlyCostCOP * 12;

            const getRecommendation = () => {
                if (!isComplete) return null;
                
                if (score >= 3) {
                    return {
                        level: "Acceso Prioritario",
                        color: "bg-blue-600 text-white",
                        icon: "🚀",
                        text: "Altamente Recomendado. Sus operaciones son críticas, dependientes del tiempo y de alta intensidad. El riesgo de cuellos de botella con el acceso estándar es alto y justifica la inversión adicional para sus 'Power Users'."
                    };
                } else if (score === 2) {
                    return {
                        level: "Zona de Evaluación (Piloto)",
                        color: "bg-yellow-500 text-white",
                        icon: "⚖️",
                        text: "Mantenga el Acceso Estándar temporalmente, pero inicie un programa piloto. Compre 1 o 2 licencias prioritarias para sus usuarios más intensivos y mida el ROI antes de una adopción masiva."
                    };
                } else {
                    return {
                        level: "Acceso Estándar",
                        color: "bg-green-600 text-white",
                        icon: "✅",
                        text: "Suficiente para su operación. Sus flujos de trabajo son lo suficientemente flexibles para tolerar posibles latencias. No es necesario asumir el costo adicional en este momento."
                    };
                }
            };

            const recommendation = getRecommendation();

const generateExecutiveSummary = async () => {
                if (!isComplete) return;
                setIsGenerating(true);
                setAiError('');
                setAiSummary('');
                setCopied(false);

                // ✅ API Key de Gemini - restringida a evaluador-copilot.vercel.app
                const apiKey = "AIzaSyDvZDvIpQEtd25SwZj4hpWM1iF3KDfPsKs" ;

                const prompt = `Actúa como un experto en tecnología de Microsoft. Genera un resumen ejecutivo persuasivo para el CFO de una empresa colombiana. 
                Datos para el resumen:
                - Recomendación: ${recommendation.level}
                - Usuarios clave: ${powerUsers}
                - Inversión anual estimada: ${new Intl.NumberFormat('es-CO').format(annualCostCOP)} COP.
                Explica brevemente por qué Copilot es una inversión estratégica ante los cambios de licenciamiento de 2026.`;

                try {
                    // ✅ Gemini 2.0 Flash - tier gratuito, restringido por dominio
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        console.error("Error Gemini:", errorData);
                        throw new Error(errorData.error?.message || 'Error en la API');
                    }

                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (aiText) {
                        setAiSummary(aiText);
                    } else {
                        throw new Error('La IA no devolvió texto');
                    }
                } catch (error) {
                    console.error("Error completo:", error);
                    setAiError(`Error: ${error.message}. Verifica tu API Key.`);
                } finally {
                    setIsGenerating(false);
                }
            };

            const fallbackCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.top = "0";
                textArea.style.left = "0";
                textArea.style.opacity = "0";
                
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                
                try {
                    document.execCommand("copy");
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    setAiError("Tu navegador bloqueó la copia. Por favor, selecciona y copia el texto manualmente.");
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8 font-sans text-gray-800">
                    <div className="max-w-4xl mx-auto space-y-8">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                            <h1 className="text-3xl font-bold text-blue-900 mb-2">Evaluador Estratégico: Copilot en Pymes</h1>
                            <p className="text-gray-600">
                                Descubra si su empresa necesita invertir en el <b>Acceso Prioritario</b> o si puede operar eficientemente con el <b>Acceso Estándar</b> de Microsoft 365.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h2 className="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                                    <span className="mr-2">📝</span> 1. Diagnóstico Operativo
                                </h2>
                                <div className="space-y-6">
                                    {questions.map((q) => (
                                        <div key={q.id} className="p-4 bg-gray-50 rounded-xl border border-gray-200">
                                            <p className="font-medium text-gray-800 mb-1">{q.text}</p>
                                            <p className="text-sm text-gray-500 mb-3">{q.detail}</p>
                                            <div className="flex space-x-3">
                                                <button
                                                    onClick={() => handleAnswer(q.id, true)}
                                                    className={`flex-1 py-2 px-4 rounded-lg font-medium transition-colors ${
                                                        answers[q.id] === true
                                                            ? 'bg-blue-600 text-white border-transparent'
                                                            : 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-100'
                                                    }`}
                                                >
                                                    Sí
                                                </button>
                                                <button
                                                    onClick={() => handleAnswer(q.id, false)}
                                                    className={`flex-1 py-2 px-4 rounded-lg font-medium transition-colors ${
                                                        answers[q.id] === false
                                                            ? 'bg-gray-600 text-white border-transparent'
                                                            : 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-100'
                                                    }`}
                                                >
                                                    No
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-8">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <h2 className="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                                        <span className="mr-2">🎯</span> 2. Veredicto
                                    </h2>
                                    {!isComplete ? (
                                        <div className="p-6 bg-blue-50 text-blue-700 rounded-xl border border-blue-100 text-center">
                                            Complete el diagnóstico a la izquierda para ver su recomendación.
                                        </div>
                                    ) : (
                                        <div className={`p-6 rounded-xl shadow-inner ${recommendation.color} transition-all duration-500`}>
                                            <div className="text-4xl mb-2">{recommendation.icon}</div>
                                            <h3 className="text-2xl font-bold mb-2">{recommendation.level}</h3>
                                            <p className="text-white/90 leading-relaxed">
                                                {recommendation.text}
                                            </p>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <h2 className="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                                        <span className="mr-2">💰</span> 3. Proyección de Costos
                                    </h2>
                                    <div className="space-y-4 mb-6">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                                Usuarios Críticos ("Power Users")
                                            </label>
                                            <input
                                                type="range" min="1" max="50" value={powerUsers}
                                                onChange={(e) => setPowerUsers(parseInt(e.target.value))}
                                                className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                            />
                                            <div className="text-right text-sm font-bold text-blue-600 mt-1">{powerUsers} empleados</div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">TRM Estimada (COP)</label>
                                                <input
                                                    type="number" value={trm}
                                                    onChange={(e) => setTrm(parseInt(e.target.value) || 0)}
                                                    className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Costo Licencia (USD/mes)</label>
                                                <input
                                                    type="number" value={usdCost}
                                                    onChange={(e) => setUsdCost(parseInt(e.target.value) || 0)}
                                                    className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-gray-800 text-white p-5 rounded-xl">
                                        <div className="mb-3">
                                            <p className="text-gray-400 text-sm">Inversión Mensual Estimada</p>
                                            <p className="text-2xl font-bold text-green-400">
                                                ${new Intl.NumberFormat('es-CO').format(monthlyCostCOP)} <span className="text-sm text-gray-400">COP</span>
                                            </p>
                                        </div>
                                        <div className="pt-3 border-t border-gray-700">
                                            <p className="text-gray-400 text-sm">Impacto Anual en Flujo de Caja</p>
                                            <p className="text-xl font-bold text-white">
                                                ${new Intl.NumberFormat('es-CO').format(annualCostCOP)} <span className="text-sm text-gray-400">COP</span>
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                {isComplete && (
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-indigo-100 bg-gradient-to-br from-indigo-50 to-white">
                                        <h2 className="text-xl font-semibold mb-4 text-indigo-900 flex items-center">
                                            <span className="mr-2">✨</span> 4. Generar Caso de Negocio (IA)
                                        </h2>
                                        <button
                                            onClick={generateExecutiveSummary}
                                            disabled={isGenerating}
                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl transition-colors disabled:bg-indigo-300 disabled:cursor-not-allowed flex justify-center items-center"
                                        >
                                            {isGenerating ? 'Generando argumento...' : '✨ Redactar Pitch con IA'}
                                        </button>

                                        {aiError && (
                                            <div className="mt-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm border border-red-200">
                                                {aiError}
                                            </div>
                                        )}

                                        {aiSummary && (
                                            <div className="mt-4 p-5 bg-white rounded-xl border border-indigo-100 shadow-inner">
                                                <div className="text-gray-800 text-sm whitespace-pre-wrap leading-relaxed">
                                                    {aiSummary}
                                                </div>
                                                <div className="mt-4 pt-3 border-t border-gray-100 flex justify-end">
                                                    <button
                                                        onClick={handleCopy}
                                                        className="text-indigo-600 hover:text-indigo-800 text-sm font-medium flex items-center"
                                                    >
                                                        {copied ? '✅ ¡Copiado!' : '📋 Copiar para el correo'}
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
